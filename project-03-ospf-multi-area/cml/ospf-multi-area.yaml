    n1: n3
    n2: n6
    i1: i4
    i2: i1
    conditioning: {}
    label: ABR2-Ethernet0/3<->R-DC1-Ethernet0/0

  # End host links
  - id: l9
    n1: n4
    n2: n7
    i1: i3
    i2: i0
    conditioning: {}
    label: R-CAMPUS1-Ethernet0/2<->PC-CAMPUS-eth0

